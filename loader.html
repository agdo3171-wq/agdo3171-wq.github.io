<div id="matrix-loader" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; color:#0f0; z-index:99999; display:flex; justify-content:center; align-items:center; font-family:monospace; font-size:1.1rem;">
    <div id="loader-content" style="width:90%; max-width:400px; text-align:left;"></div>
</div>

<script>
const lines = [
    "> Initializing Secure Connection...",
    "> Bypassing Firewall...",
    "> Loading Encrypted Modules...",
    "> Access Granted. Welcome Admin."
];

let lineIdx = 0;
const display = document.getElementById('loader-content');

function typeLog() {
    if (lineIdx < lines.length) {
        display.innerHTML += lines[lineIdx] + "<br>";
        lineIdx++;
        setTimeout(typeLog, 800); 
    } else {
        setTimeout(() => {
            document.getElementById('matrix-loader').style.display = 'none';
        }, 1000);
    }
}
window.onload = typeLog;
</script>
