<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberGuard 2026 | Matrix Terminal</title>
    <style>
        body { background-color: black; color: #0f0; font-family: 'Courier New', Courier, monospace; margin: 0; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .chat-section { background: rgba(0, 20, 0, 0.85); border: 2px solid #0f0; padding: 20px; border-radius: 5px; box-shadow: 0 0 20px #0f0; width: 320px; pointer-events: auto; }
        button { background: #0f0; color: black; border: none; padding: 12px; cursor: pointer; font-weight: bold; width: 100%; font-family: monospace; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #fff; box-shadow: 0 0 10px #fff; }
        #reviews-box { display: none; margin-top: 10px; border: 1px solid #0f0; padding: 8px; text-align: right; max-height: 120px; overflow-y: auto; font-size: 0.75rem; background: #000; }
        .price-tag { display: flex; justify-content: space-between; font-size: 0.8rem; margin: 5px 0; border-bottom: 1px solid #030; }
    </style>
</head>
<body>

<div id="loader" style="position:fixed; top:0; left:0; width:100%; height:100%; background:black; color:#0f0; z-index:99999; display:flex; justify-content:center; align-items:center; flex-direction:column;">
    <div id="loader-text"></div>
</div>

<canvas id="matrix"></canvas>

<div class="content">
    <div class="chat-section">
        <h2 style="text-shadow: 0 0 5px #0f0;">[ SYSTEM_ACTIVE ]</h2>
        <p style="font-size: 0.8rem;">Secure Terminal: CyberGuard_2026</p>
        
        <button onclick="window.open('https://t.me/CyberGuard2026b_bot')">📩 ارسل امر (تواصل خاص)</button>

        <div style="margin-top:10px; color:#ff0000; border:1px solid #ff0000; padding:3px; font-size: 0.7rem;">
            ● المستعرضون: <span id="user-count">142</span>
        </div>

        <marquee style="background:rgba(0,255,0,0.1); font-size:0.7rem; margin-top:8px;">[SUCCESS] Encryption Done.. [INFO] Trace Hidden.. [DONE] Task #882</marquee>

        <div style="margin-top:10px; text-align:left; border-top:1px solid #0f0; padding-top:5px;">
            <div class="price-tag"><span>Secure Account:</span><span style="color:yellow">$10</span></div>
            <div class="price-tag"><span>Recovery:</span><span style="color:yellow">$15</span></div>
        </div>

        <button onclick="toggleReviews()" style="background:#111; color:#0f0; border:1px solid #0f0; font-size:0.7rem;">[ VIEW_LOGS ]</button>
        <div id="reviews-box">
            <p>👤 مستخدم_71: تم التأمين بنجاح.</p>
            <p>👤 خالد: شكراً يا بطل، ثقة!</p>
            <p>👤 مجهول: استرجعت حسابي 🌹</p>
        </div>
    </div>
</div>

<script>
    // كود الماتريكس (القديم اللي تحبه)
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%';
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    function draw() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#0F0';
        ctx.font = fontSize + 'px monospace';
        drops.forEach((y, i) => {
            const text = letters[Math.floor(Math.random() * letters.length)];
            ctx.fillText(text, i * fontSize, y * fontSize);
            if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 33);

    // شاشة التحميل
    const loaderMsg = ["> Accessing...", "> Bypassing...", "> Welcome Admin."];
    let mIdx = 0;
    function typeLoader() {
        if(mIdx < loaderMsg.length) {
            document.getElementById('loader-text').innerHTML += loaderMsg[mIdx] + "<br>";
            mIdx++; setTimeout(typeLoader, 800);
        } else {
            setTimeout(() => { document.getElementById('loader').style.display='none'; }, 1000);
        }
    }
    window.onload = typeLoader;

    // فتح وإغلاق التعليقات
    function toggleReviews() {
        const box = document.getElementById('reviews-box');
        box.style.display = (box.style.display === 'none' || box.style.display === '') ? 'block' : 'none';
    }
</script>
</body>
</html>
